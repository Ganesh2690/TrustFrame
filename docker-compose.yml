version: '3.9'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trustframe
      POSTGRES_PASSWORD: trustframe
      POSTGRES_DB: trustframe
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustframe"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://trustframe:trustframe@db:5432/trustframe
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      REPORT_TOKEN_SECRET: ${REPORT_TOKEN_SECRET:-change-me-reports}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: 500
      CORS_ORIGINS: '["http://localhost","http://localhost:80","http://localhost:5173"]'
      ADMIN_SECRET: ${ADMIN_SECRET:-admin-password-change-me}
      APP_URL: ${APP_URL:-http://localhost}
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
